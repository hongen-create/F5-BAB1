<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第一关：挑战总结</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans SC', 'Times New Roman', serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #05080f, #11151c);
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .summary-card {
            width: 90%;
            background: linear-gradient(135deg, #161f2b, #0d131a);
            border: 2px solid #8b6508;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(139, 101, 8, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.8);
            text-align: center;
            color: #f0f0f0;
        }

        .level-title {
            font-family: 'Cinzel', serif;
            color: #ffdf70;
            font-size: 22px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ffdf70;
            letter-spacing: 2px;
        }

        .metric-group {
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #4a3020;
        }

        .metric-item {
            text-align: center;
        }

        .metric-label {
            font-size: 13px;
            color: #d4bb8c;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffdf70;
            text-shadow: 0 0 5px rgba(255, 223, 112, 0.5);
        }

        .teacher-box {
            background: rgba(139, 101, 8, 0.1);
            border: 1px dashed #8b6508;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: left;
            line-height: 1.6;
            color: #e3cfa8;
        }

        .teacher-title {
            font-weight: bold;
            color: #ffdf70;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 15px;
        }

        .teacher-msg {
            font-size: 14px;
            white-space: pre-line;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(to bottom, #d4af37, #8b6508);
            border: 2px solid #ffdf70;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            transition: transform 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="summary-card">
        <h2 class="level-title">寻宝岛 试炼总结</h2>
        
        <div class="metric-group">
            <div class="metric-item">
                <div class="metric-label">通关得分</div>
                <div class="metric-value" id="val-score">0 / 5</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">所用时间</div>
                <div class="metric-value" id="val-time">0 秒</div>
            </div>
        </div>

        <div class="teacher-box">
            <div class="teacher-title">👨‍🏫 Jack老师</div>
            <p class="teacher-msg" id="teacher-msg">
                做得很棒！

                你已经成功发现许多重要的历史线索。

                继续努力，
                看看自己还能闯过多少挑战！
            </p>
        </div>

        <button class="action-btn" onclick="proceed()">继续挑战</button>
    </div>
</div>

<script>
    const SESSION_KEY = 'sovereigns_relic_session';

    function loadGameSession() {
        const session = localStorage.getItem(SESSION_KEY);
        return session ? JSON.parse(session) : null;
    }

    function initSummary() {
        const session = loadGameSession();
        if (session) {
            document.getElementById('val-score').innerText = `${session.level1Score} / 5`;
            
            // Format time representation
            const timeVal = session.level1Time;
            if (timeVal >= 60) {
                const mins = Math.floor(timeVal / 60);
                const secs = timeVal % 60;
                document.getElementById('val-time').innerText = `${mins} 分 ${secs} 秒`;
            } else {
                document.getElementById('val-time').innerText = `${timeVal} 秒`;
            }
        }
    }

    function proceed() {
        window.location.href = "transit.html";
    }

    window.onload = initSummary;
</script>
</body>
</html>
