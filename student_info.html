<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索者信息档案</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans SC', 'Times New Roman', serif;
        }

        body {
            background-color: #030504;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 电影级自适应 9:16 纵向容器 */
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #091316 0%, #020405 100%);
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 背景微光与古叶粒子画布 */
        #gardenCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 暗角遮罩 */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, transparent 20%, rgba(3,10,6,0.92) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* 变动：高阶暗绿色玻璃质感卡片 */
        .form-card {
            width: 90%;
            background: linear-gradient(135deg, rgba(16, 26, 21, 0.95) 0%, rgba(6, 12, 10, 0.99) 100%);
            border: 2px solid #ffdf70;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 35px rgba(255, 223, 112, 0.2), inset 0 0 20px rgba(0, 255, 102, 0.05);
            text-align: center;
            color: #f0f0f0;
            z-index: 10;
            position: relative;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: formCardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes formCardFadeIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes mentorFloating {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }

        .form-title {
            font-family: 'Cinzel', serif;
            color: #ffdf70;
            font-size: 22px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 223, 112, 0.6);
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 13px;
            color: #d4bb8c;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 极富科技质感的高亮高光输入框 */
        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* 变动：升级后的黄金立体交互按键 */
        .action-btn {
            display: block;
            width: 100%;
            padding: 14px 30px;
            background: linear-gradient(to bottom, #d4af37, #8b6508);
            border: 2px solid #ffdf70;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            outline: none;
            letter-spacing: 2px;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .error-hint {
            font-size: 11px;
            color: #ff3333;
            margin-top: 4px;
            display: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 植物花园画布粒子 -->
    <canvas id="gardenCanvas"></canvas>
    
    <div class="vignette"></div>

    <div class="form-card">
        <!-- 变动：杰克老师导师悬浮亲授头像 (Jack Teacher Presentation) -->
        <div style="width: 85px; height: 85px; margin: -10px auto 15px auto;">
            <img src="JACK1.png" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.75)); animation: mentorFloating 4s ease-in-out infinite alternate;" />
        </div>

        <h2 class="form-title">探索者信息建档</h2>
        
        <form id="infoForm" onsubmit="handleFormSubmit(event)">
            <div class="input-group">
                <label class="input-label" for="inp-name">探索者姓名 (Name)</label>
                <!-- 保持原有的 inp-name ID 绑定 -->
                <input type="text" id="inp-name" class="form-input" placeholder="请输入你的姓名" autocomplete="off" required>
                <!-- 保持原有的 err-name 错误提示 -->
                <div class="error-hint" id="err-name">姓名不能为空</div>
            </div>

            <div class="input-group">
                <label class="input-label" for="inp-phone">联系电话 (Phone)</label>
                <input type="tel" id="inp-phone" class="form-input" placeholder="请输入你的联系电话" autocomplete="off" required>
                <div class="error-hint" id="err-phone">请输入有效的联系电话</div>
            </div>

            <div class="input-group">
                <label class="input-label" for="inp-email">电子邮箱 (Email)</label>
                <input type="email" id="inp-email" class="form-input" placeholder="请输入你的电子邮箱" autocomplete="off" required>
                <div class="error-hint" id="err-email">请输入有效的电子邮箱</div>
            </div>

            <button type="submit" class="action-btn">确认提交</button>
        </form>
    </div>
</div>

<script>
    /* ==========================================
       DATA FLOW DOCKING MODULE (DO NOT MODIFY)
       ========================================== */
    const SESSION_KEY = 'sovereigns_relic_session';

    function loadGameSession() {
        const session = localStorage.getItem(SESSION_KEY);
        return session ? JSON.parse(session) : null;
    }

    function saveGameSession(sessionData) {
        localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
    }

    // Checking validation constraints on boot
    function checkDirectRedirect() {
        const session = loadGameSession();
        if (
            session &&
            session.completedStatus === false &&
            session.name &&
            session.phone &&
            session.email
        ) {
            // Bypass page if active valid profile metrics already stored
            window.location.href = "loading.html";
        }
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        
        const nameVal = document.getElementById('inp-name').value.trim();
        const phoneVal = document.getElementById('inp-phone').value.trim();
        const emailVal = document.getElementById('inp-email').value.trim();

        let valid = true;

        if (!nameVal) {
            document.getElementById('err-name').style.display = 'block';
            valid = false;
        } else {
            document.getElementById('err-name').style.display = 'none';
        }

        if (!phoneVal || phoneVal.length < 5) {
            document.getElementById('err-phone').style.display = 'block';
            valid = false;
        } else {
            document.getElementById('err-phone').style.display = 'none';
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailVal || !emailRegex.test(emailVal)) {
            document.getElementById('err-email').style.display = 'block';
            valid = false;
        } else {
            document.getElementById('err-email').style.display = 'none';
        }

        if (valid) {
            const session = loadGameSession();
            if (session) {
                session.name = nameVal;
                session.phone = phoneVal;
                session.email = emailVal;
                saveGameSession(session);
            }
            window.location.href = "loading.html";
        }
    }

    window.onload = checkDirectRedirect;


    /* ==========================================
       🌿 历史成长花园：CANVAS 渲染环境动效
       ========================================== */
    const canvas = document.getElementById('gardenCanvas');
    const ctx = canvas.getContext('2d');
    let gameParticles = [];

    function resizePCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resizePCanvas);
    resizePCanvas();

    // 城堡阴影绘制
    function drawCastle(ctx, w, h) {
        ctx.save();
        ctx.fillStyle = 'rgba(8, 20, 16, 0.45)';
        ctx.beginPath();
        const baseH = h - 60;
        
        ctx.moveTo(w * 0.1, h);
        ctx.lineTo(w * 0.1, baseH);
        ctx.lineTo(w * 0.14, baseH);
        ctx.lineTo(w * 0.14, baseH - 35);
        ctx.lineTo(w * 0.17, baseH - 35);
        ctx.lineTo(w * 0.19, baseH - 70); 
        ctx.lineTo(w * 0.21, baseH - 35);
        ctx.lineTo(w * 0.24, baseH - 35);
        ctx.lineTo(w * 0.24, h);
        
        ctx.moveTo(w * 0.72, h);
        ctx.lineTo(w * 0.72, baseH - 15);
        ctx.lineTo(w * 0.77, baseH - 15);
        ctx.lineTo(w * 0.8, baseH - 85); 
        ctx.lineTo(w * 0.83, baseH - 15);
        ctx.lineTo(w * 0.88, baseH - 15);
        ctx.lineTo(w * 0.88, h);
        ctx.fill();
        ctx.restore();
    }

    // 湛蓝与黄金暖芒
    function drawWarmSunlight(ctx, w, h, time) {
        ctx.save();
        const pulse = (Math.sin(time / 1200) + 1) / 2;
        const gradient = ctx.createRadialGradient(w * 0.85, h * 0.08, 10, w * 0.85, h * 0.08, 280 + pulse * 35);
        gradient.addColorStop(0, 'rgba(255, 223, 112, 0.12)'); // 黄金
        gradient.addColorStop(0.5, 'rgba(0, 229, 255, 0.03)'); // 湛蓝
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
    }

    class GardenParticle {
        constructor() {
            this.reset();
            this.y = Math.random() * canvas.height;
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = -10;
            this.size = Math.random() * 3.5 + 2.5;
            this.speedY = Math.random() * 0.5 + 0.25;
            this.speedX = Math.random() * 0.2 - 0.05;
            this.angle = Math.random() * Math.PI * 2;
            this.rotSpeed = Math.random() * 0.015 - 0.0075;
            this.type = Math.random() > 0.4 ? 'leaf' : 'pollen';
            this.color = this.type === 'leaf' ? '#3d6345' : '#ffd700'; // 绿叶与金粉
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;
            this.angle += this.rotSpeed;
            if (this.y > canvas.height + 10 || this.x > canvas.width + 10 || this.x < -10) {
                this.reset();
            }
        }
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            if (this.type === 'leaf') {
                ctx.moveTo(0, -this.size);
                ctx.quadraticCurveTo(this.size / 2, 0, 0, this.size);
                ctx.quadraticCurveTo(-this.size / 2, 0, 0, -this.size);
                ctx.fill();
            } else {
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ffd700';
                ctx.arc(0, 0, this.size / 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    for (let i = 0; i < 20; i++) {
        gameParticles.push(new GardenParticle());
    }

    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 渲染城堡
        drawCastle(ctx, canvas.width, canvas.height);
        
        // 渲染日光
        drawWarmSunlight(ctx, canvas.width, canvas.height, Date.now());
        
        // 渲染粒子
        gameParticles.forEach(p => {
            p.update();
            p.draw(ctx);
        });
        
        requestAnimationFrame(renderLoop);
    }

    requestAnimationFrame(renderLoop);
</script>
</body>
</html>
