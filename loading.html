<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分析档案生成中...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans SC', 'Times New Roman', serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            overflow: hidden;
            background: #05080f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #d4af37;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="loader-ring"></div>
    <div class="loading-text">正在生成你的学习报告...</div>
</div>

<script>
    setTimeout(() => {
        window.location.href = "final_report.html";
    }, 2500);
</script>
</body>
</html>
